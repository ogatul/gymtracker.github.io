<!DOCTYPE html>
<html>
<head>
  <title>Gym Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF LIBRARY -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background:black;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }

    button {
      padding:10px;
      margin:5px;
      border:1px solid white;
      background:white;
      color:black;
      cursor:pointer;
    }

    button.active {
      background:black;
      color:white;
    }

    input {
      padding:8px;
      margin:5px;
      border:1px solid white;
      background:black;
      color:white;
    }

    .card {
      border:1px solid white;
      margin:10px auto;
      padding:10px;
      max-width:400px;
      text-align:left;
    }

    .small {
      padding:5px;
      font-size:12px;
    }
  </style>
</head>

<body>

<h1>GYM TRACKER</h1>

<!-- DAY -->
<div>
  <button onclick="setDay('push')" id="pushBtn">PUSH</button>
  <button onclick="setDay('pull')" id="pullBtn">PULL</button>
  <button onclick="setDay('legs')" id="legsBtn">LEGS</button>
</div>

<!-- OPTIONS -->
<div>
  <button onclick="toggleAll()">VIEW ALL</button>
  <button onclick="downloadPDF()">DOWNLOAD PDF</button>
</div>

<!-- DATE FILTER -->
<div>
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="applyFilter()">FILTER</button>
</div>

<h2 id="title">SELECT DAY</h2>
<p id="date"></p>

<!-- INPUT -->
<div>
  <input id="ex" placeholder="Exercise">
  <input id="w" placeholder="Weight">
  <input id="r" placeholder="Reps">
  <br>
  <button onclick="add()">ADD</button>
</div>

<hr>

<div id="output"></div>

<script>
let data = JSON.parse(localStorage.getItem("gymData")) || [];
let currentDay = "";
let showAll = false;
let filteredData = [];

// DATE
document.getElementById("date").innerText = new Date().toDateString();

// SELECT DAY
function setDay(day) {
  currentDay = day;
  showAll = false;
  document.getElementById("title").innerText = day.toUpperCase();
  show();
}

// ADD
function add() {
  if (!currentDay) return alert("Select day first");

  let ex = document.getElementById("ex").value;
  let w = document.getElementById("w").value;
  let r = document.getElementById("r").value;

  if (!ex || !w || !r) return alert("Fill all fields");

  data.push({
    id: Date.now(),
    day: currentDay,
    ex,
    w,
    r,
    date: new Date().toISOString().split("T")[0]
  });

  localStorage.setItem("gymData", JSON.stringify(data));

  document.getElementById("ex").value = "";
  document.getElementById("w").value = "";
  document.getElementById("r").value = "";

  show();
}

// FILTER
function applyFilter() {
  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  filteredData = data.filter(e => {
    return (!start || e.date >= start) && (!end || e.date <= end);
  });

  show(filteredData);
}

// SHOW
function show(custom) {
  let out = document.getElementById("output");
  out.innerHTML = "";

  let list = custom || (showAll ? data : data.filter(e => e.day === currentDay));

  list = list.sort((a,b) => new Date(b.date) - new Date(a.date));

  if (list.length === 0) {
    out.innerHTML = "<p>No data</p>";
    return;
  }

  list.forEach(e => {
    out.innerHTML += `
      <div class="card">
        <strong>${e.day.toUpperCase()}</strong> - ${e.date}<br>
        ${e.ex}<br>
        ${e.w} kg × ${e.r}
        <br>
        <button class="small" onclick="edit(${e.id})">EDIT</button>
        <button class="small" onclick="del(${e.id})">DELETE</button>
      </div>
    `;
  });
}

// DELETE
function del(id) {
  data = data.filter(e => e.id !== id);
  localStorage.setItem("gymData", JSON.stringify(data));
  show();
}

// EDIT
function edit(id) {
  let item = data.find(e => e.id === id);

  let ex = prompt("Exercise:", item.ex);
  let w = prompt("Weight:", item.w);
  let r = prompt("Reps:", item.r);

  if (!ex || !w || !r) return;

  item.ex = ex;
  item.w = w;
  item.r = r;

  localStorage.setItem("gymData", JSON.stringify(data));
  show();
}

// PDF DOWNLOAD (FIXED)
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  let pdf = new jsPDF();

  let list = filteredData.length ? filteredData : data;

  if (list.length === 0) {
    alert("No data to export");
    return;
  }

  let y = 10;

  list.forEach((e, i) => {
    pdf.text(
      `${i+1}. ${e.day.toUpperCase()} | ${e.ex} | ${e.w}kg x ${e.r} | ${e.date}`,
      10,
      y
    );
    y += 10;

    if (y > 280) {
      pdf.addPage();
      y = 10;
    }
  });

  pdf.save("gym-data.pdf");
}
</script>

</body>
</html>
