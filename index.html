
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gym Tracker Ultra | Liquid Glass</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent: #007AFF;
      --accent-glow: rgba(0, 122, 255, 0.5);
      --bg-dark: #050505;
      --success: #34c759;
    }

    * { 
      box-sizing: border-box; 
      -webkit-font-smoothing: antialiased; 
      -webkit-tap-highlight-color: transparent; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      margin: 0;
      padding: 20px;
      color: white;
      min-height: 100vh;
      background-color: var(--bg-dark);
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    /* 🌊 DYNAMIC MESH BACKGROUND */
    .mesh-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: var(--bg-dark);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 25s infinite alternate ease-in-out;
    }
    .b1 { background: #0047ff; top: -10%; left: -10%; }
    .b2 { background: #5e17eb; bottom: -10%; right: -10%; animation-delay: -5s; }
    .b3 { background: #ff2d55; top: 40%; left: 30%; animation-delay: -10s; opacity: 0.1; }

    @keyframes drift {
      from { transform: translate(0,0) rotate(0deg) scale(1); }
      to { transform: translate(120px, 120px) rotate(45deg) scale(1.3); }
    }

    /* ✨ MAIN CONTAINER & REVEAL */
    .container {
      width: 100%;
      max-width: 410px;
      z-index: 1;
      animation: mainFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes mainFadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      font-weight: 800;
      font-size: 2.8rem;
      letter-spacing: -1.5px;
      margin: 20px 0 30px 0;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 🧊 GLASS CARDS */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .label-text {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
      display: block;
      padding-left: 5px;
    }

    /* 💡 INPUTS WITH REAR LIGHTING */
    input {
      width: 100%;
      height: 54px;
      padding: 0 20px;
      margin: 8px 0 16px 0;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(0, 0, 0, 0.4);
      color: white;
      font-size: 16px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    input:focus {
      outline: none;
      background: rgba(0, 0, 0, 0.6);
      border-color: var(--accent);
      box-shadow: 0 0 25px -5px var(--accent-glow);
      transform: translateY(-2px);
    }

    input[type="date"] { color-scheme: dark; }

    .row { display: flex; gap: 12px; }

    /* 🔘 BUTTONS */
    .btn-group { display: flex; gap: 8px; margin-bottom: 25px; }

    button {
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab-btn {
      flex: 1;
      height: 48px;
      border-radius: 15px;
      background: rgba(255,255,255,0.06);
      color: #999;
    }

    .tab-btn.active {
      background: #fff;
      color: #000;
      transform: scale(1.04);
      box-shadow: 0 8px 20px rgba(255,255,255,0.1);
    }

    .primary-btn {
      width: 100%;
      height: 58px;
      border-radius: 20px;
      background: var(--accent);
      color: white;
      font-size: 18px;
      box-shadow: 0 8px 25px -5px var(--accent-glow);
    }

    .filter-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      height: 44px;
      border-radius: 12px;
      flex: 1;
      font-size: 13px;
    }

    button:active { transform: scale(0.94); }

    /* 📋 ENTRIES & STAGGER ANIMATION */
    .entry {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 15px;
      position: relative;
      animation: entryReveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes entryReveal {
      from { opacity: 0; transform: translateX(-20px); filter: blur(10px); }
      to { opacity: 1; transform: translateX(0); filter: blur(0); }
    }

    .stats {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 5px;
    }
    .stats span { font-size: 0.9rem; color: #666; font-weight: 400; }

    .date-badge {
      position: absolute;
      top: 22px; right: 22px;
      font-size: 11px;
      color: #555;
      font-weight: 500;
    }

    .flash-success {
      animation: successPulse 0.5s ease-out;
    }
    @keyframes successPulse {
      0% { box-shadow: 0 0 0 0 var(--success); }
      50% { border-color: var(--success); }
      100% { box-shadow: 0 0 0 20px transparent; }
    }

    /* ✍️ FOOTER SIGNATURE */
    footer {
      text-align: center;
      margin-top: 50px;
      padding-bottom: 40px;
      opacity: 0.6;
    }
    .made-by {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
      margin: 0;
    }
    .author {
      font-size: 16px;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-top: 6px;
      background: linear-gradient(to right, #fff, rgba(255,255,255,0.3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

<div class="mesh-container">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="container">
  <h1>Tracker Pro</h1>

  <div class="btn-group">
    <button onclick="setDay('push')" id="pushBtn" class="tab-btn">Push</button>
    <button onclick="setDay('pull')" id="pullBtn" class="tab-btn">Pull</button>
    <button onclick="setDay('legs')" id="legsBtn" class="tab-btn">Legs</button>
  </div>

  <div id="inputCard" class="glass">
    <span class="label-text">Log New Activity</span>
    <input id="ex" placeholder="Exercise (e.g. Bench Press)" spellcheck="false">
    <div class="row">
      <input id="w" type="number" placeholder="Weight (kg)">
      <input id="r" type="number" placeholder="Reps">
    </div>
    <button class="primary-btn" onclick="add()">Save Set</button>
  </div>

  <div class="glass">
    <span class="label-text">Performance Filter</span>
    <div class="row">
      <input type="date" id="start" style="height:44px; margin-bottom:8px;">
      <input type="date" id="end" style="height:44px; margin-bottom:8px;">
    </div>
    <div class="row">
      <button class="filter-btn" onclick="filterData()">Filter</button>
      <button class="filter-btn" onclick="downloadPDF()">Export PDF</button>
    </div>
  </div>

  <div id="output"></div>

  <footer>
    <p class="made-by">Made by</p>
    <p class="author">Ogatul</p>
  </footer>
</div>

<script>
  let data = JSON.parse(localStorage.getItem("gymData")) || [];
  let currentDay = "";

  function setDay(d){
    currentDay = d;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(d+"Btn").classList.add("active");
    show();
  }

  function add(){
    if(!currentDay) return alert("Please select a workout type (Push/Pull/Legs)");
    let ex = val("ex"), w = val("w"), r = val("r");
    if(!ex||!w||!r) return;

    data.push({
      id: Date.now(),
      day: currentDay,
      ex, w, r,
      date: new Date().toISOString().split('T')[0]
    });

    const card = document.getElementById('inputCard');
    card.classList.add('flash-success');
    setTimeout(() => card.classList.remove('flash-success'), 500);

    save(); clear(); show();
  }

  function filterData(){
    let s = val("start"), e = val("end");
    let filtered = data.filter(x => (!s || x.date >= s) && (!e || x.date <= e));
    show(filtered);
  }

  function show(customList){
    let out = document.getElementById("output");
    out.innerHTML="";
    let list = customList || data.filter(x=>x.day===currentDay);
    list = list.slice().reverse(); 
    
    list.forEach((e, index) => {
      let div = document.createElement('div');
      div.className = 'entry';
      div.style.animationDelay = `${index * 0.06}s`;
      div.innerHTML = `
        <span class="date-badge">${e.date}</span>
        <b style="font-size:1.1rem; letter-spacing:-0.3px;">${e.ex}</b>
        <div class="stats">
          ${e.w} <span>kg</span> <span style="margin: 0 4px; color:#222">/</span> ${e.r} <span>reps</span>
        </div>
        <div class="row" style="margin-top:18px;">
          <button class="tab-btn" style="height:34px; font-size:11px; background:rgba(255,59,48,0.1); color:#ff3b30;" onclick="del(${e.id})">Delete</button>
        </div>
      `;
      out.appendChild(div);
    });
  }

  function del(id){
    if(confirm("Permanently delete this record?")) {
      data = data.filter(x=>x.id!==id);
      save(); show();
    }
  }

  function downloadPDF(){
    const { jsPDF } = window.jspdf;
    let pdf = new jsPDF();
    pdf.setFont("helvetica", "bold");
    pdf.text("PROGRESS REPORT", 20, 20);
    pdf.setFontSize(10);
    pdf.setFont("helvetica", "normal");
    data.forEach((e, i) => {
      pdf.text(`${e.date} | ${e.day.toUpperCase()} | ${e.ex}: ${e.w}kg x ${e.r}`, 20, 35 + (i * 7));
    });
    pdf.save("Workout_History.pdf");
  }

  function val(id){return document.getElementById(id).value}
  function clear(){["ex","w","r"].forEach(id=>document.getElementById(id).value="")}
  function save(){localStorage.setItem("gymData",JSON.stringify(data))}
  
  // Launch with Push day selected
  setDay('push');
</script>

</body>
</html>
