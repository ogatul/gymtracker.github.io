<!DOCTYPE html>
<html>
<head>
  <title>Gym Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { background:black; color:white; font-family:Arial; text-align:center; padding:20px; }

    button {
      padding:10px; margin:5px;
      border:1px solid white;
      background:white; color:black;
      cursor:pointer;
    }

    button.active { background:black; color:white; }

    input {
      padding:8px; margin:5px;
      border:1px solid white;
      background:black; color:white;
    }

    .card {
      border:1px solid white;
      margin:10px auto;
      padding:10px;
      max-width:400px;
      text-align:left;
    }

    .small { padding:5px; font-size:12px; }
  </style>
</head>

<body>

<h1>GYM TRACKER</h1>

<!-- DAY -->
<div>
  <button onclick="setDay('push')" id="pushBtn">PUSH</button>
  <button onclick="setDay('pull')" id="pullBtn">PULL</button>
  <button onclick="setDay('legs')" id="legsBtn">LEGS</button>
</div>

<!-- HISTORY -->
<div>
  <button onclick="toggleAll()">VIEW ALL</button>
</div>

<!-- DATE FILTER -->
<div>
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="applyFilter()">FILTER</button>
</div>

<!-- DOWNLOAD -->
<div>
  <button onclick="downloadData()">DOWNLOAD FILTERED</button>
</div>

<h2 id="title">SELECT DAY</h2>
<p id="date"></p>

<!-- INPUT -->
<div>
  <input id="ex" placeholder="Exercise">
  <input id="w" placeholder="Weight">
  <input id="r" placeholder="Reps">
  <br>
  <button onclick="add()">ADD</button>
</div>

<hr>

<div id="output"></div>

<script>
let data = JSON.parse(localStorage.getItem("gymData")) || [];
let currentDay = "";
let showAll = false;
let filteredData = [];

// DATE
document.getElementById("date").innerText = new Date().toDateString();

// SELECT DAY
function setDay(day) {
  currentDay = day;
  showAll = false;

  document.getElementById("title").innerText = day.toUpperCase();

  document.getElementById("pushBtn").classList.remove("active");
  document.getElementById("pullBtn").classList.remove("active");
  document.getElementById("legsBtn").classList.remove("active");

  document.getElementById(day + "Btn").classList.add("active");

  show();
}

// VIEW ALL
function toggleAll() {
  showAll = !showAll;
  show();
}

// ADD
function add() {
  if (!currentDay) return alert("Select day first");

  let ex = document.getElementById("ex").value;
  let w = document.getElementById("w").value;
  let r = document.getElementById("r").value;

  if (!ex || !w || !r) return alert("Fill all fields");

  data.push({
    id: Date.now(),
    day: currentDay,
    ex, w, r,
    date: new Date().toISOString().split("T")[0] // YYYY-MM-DD (important)
  });

  localStorage.setItem("gymData", JSON.stringify(data));

  document.getElementById("ex").value = "";
  document.getElementById("w").value = "";
  document.getElementById("r").value = "";

  show();
}

// FILTER
function applyFilter() {
  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  filteredData = data.filter(e => {
    return (!start || e.date >= start) && (!end || e.date <= end);
  });

  show(filteredData);
}

// SHOW
function show(customData) {
  let out = document.getElementById("output");
  out.innerHTML = "";

  let list;

  if (customData) {
    list = customData;
  } else {
    list = showAll ? data : data.filter(e => e.day === currentDay);
  }

  // SORT BY DATE (latest first)
  list = list.sort((a,b) => new Date(b.date) - new Date(a.date));

  if (list.length === 0) {
    out.innerHTML = "<p>No data</p>";
    return;
  }

  list.forEach(e => {
    out.innerHTML += `
      <div class="card">
        <strong>${e.day.toUpperCase()}</strong><br>
        ${e.ex}<br>
        ${e.w} kg × ${e.r}<br>
        📅 ${e.date}
        <br>
        <button class="small" onclick="edit(${e.id})">EDIT</button>
        <button class="small" onclick="del(${e.id})">DELETE</button>
      </div>
    `;
  });
}

// DELETE
function del(id) {
  data = data.filter(e => e.id !== id);
  localStorage.setItem("gymData", JSON.stringify(data));
  show();
}

// EDIT
function edit(id) {
  let item = data.find(e => e.id === id);

  let ex = prompt("Exercise:", item.ex);
  let w = prompt("Weight:", item.w);
  let r = prompt("Reps:", item.r);

  if (!ex || !w || !r) return;

  item.ex = ex;
  item.w = w;
  item.r = r;

  localStorage.setItem("gymData", JSON.stringify(data));
  show();
}

// DOWNLOAD FILTERED
function downloadData() {
  let toDownload = filteredData.length ? filteredData : data;

  let blob = new Blob([JSON.stringify(toDownload, null, 2)], {
    type: "application/json"
  });

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "gym-data.json";
  a.click();
}
</script>

</body>
</html>
