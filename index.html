<!DOCTYPE html>
<html>
<head>
  <title>Gym App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      margin: 0;
      padding: 20px;
      color: white;

      /* 🎨 BACKGROUND FOR GLASS */
      background:
        radial-gradient(circle at 20% 20%, #3a3a3a, transparent 40%),
        radial-gradient(circle at 80% 80%, #1f1f1f, transparent 40%),
        linear-gradient(135deg, #0a0a0a, #1a1a1a);
    }

    .container {
      max-width: 450px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-weight: 500;
      margin-bottom: 20px;
    }

    /* 🍎 REAL GLASS */
    .glass {
      position: relative;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 15px;
      margin-bottom: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .glass:hover {
      transform: scale(1.02);
    }

    /* ✨ LIGHT REFLECTION */
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.05),
        transparent
      );
      opacity: 0.3;
      pointer-events: none;
    }

    /* BUTTONS */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      transition: 0.25s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.95);
    }

    .active {
      background: white;
      color: black;
      font-weight: 500;
    }

    /* INPUT */
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      outline: none;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    /* ENTRY */
    .entry {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(15px);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      animation: fadeIn 0.4s ease;
      transition: 0.3s;
    }

    .entry:hover {
      transform: translateY(-3px);
    }

    .small {
      font-size: 12px;
      margin-top: 5px;
      padding: 5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="container">

<h1>Gym Tracker</h1>

<!-- DAY -->
<div class="btn-group">
  <button onclick="setDay('push')" id="pushBtn">Push</button>
  <button onclick="setDay('pull')" id="pullBtn">Pull</button>
  <button onclick="setDay('legs')" id="legsBtn">Legs</button>
</div>

<!-- INPUT -->
<div class="glass">
  <input id="ex" placeholder="Exercise">
  <div class="row">
    <input id="w" placeholder="Weight">
    <input id="r" placeholder="Reps">
  </div>
  <button onclick="add()">Add Entry</button>
</div>

<!-- FILTER + PDF -->
<div class="glass">
  <input type="date" id="start">
  <input type="date" id="end">
  <button onclick="filterData()">Filter</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- OUTPUT -->
<div id="output"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("gymData")) || [];
let currentDay = "";
let filtered = [];

// DAY SELECT
function setDay(d){
  currentDay = d;

  ["push","pull","legs"].forEach(x=>{
    document.getElementById(x+"Btn").classList.remove("active");
  });
  document.getElementById(d+"Btn").classList.add("active");

  show();
}

// ADD
function add(){
  if(!currentDay) return alert("Select day");

  let ex = val("ex"), w = val("w"), r = val("r");
  if(!ex||!w||!r) return alert("Fill all");

  data.push({
    id: Date.now(),
    day: currentDay,
    ex,w,r,
    date: new Date().toISOString().split("T")[0]
  });

  save();
  clear();
  show();
}

// FILTER
function filterData(){
  let s = val("start"), e = val("end");

  filtered = data.filter(x=>
    (!s||x.date>=s)&&(!e||x.date<=e)
  );

  show(filtered);
}

// SHOW
function show(custom){
  let out = document.getElementById("output");
  out.innerHTML="";

  let list = custom || data.filter(x=>x.day===currentDay);

  list.sort((a,b)=>new Date(b.date)-new Date(a.date));

  list.forEach(e=>{
    out.innerHTML+=`
      <div class="entry">
        <b>${e.ex}</b><br>
        ${e.w}kg × ${e.r}<br>
        ${e.date}
        <br>
        <button class="small" onclick="edit(${e.id})">Edit</button>
        <button class="small" onclick="del(${e.id})">Delete</button>
      </div>
    `;
  });
}

// EDIT
function edit(id){
  let i=data.find(x=>x.id===id);
  let ex=prompt("Exercise:",i.ex);
  let w=prompt("Weight:",i.w);
  let r=prompt("Reps:",i.r);
  if(!ex||!w||!r) return;
  i.ex=ex;i.w=w;i.r=r;
  save(); show();
}

// DELETE
function del(id){
  data=data.filter(x=>x.id!==id);
  save(); show();
}

// PDF
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let pdf = new jsPDF();
  let list = filtered.length?filtered:data;
  let y=10;
  list.forEach((e,i)=>{
    pdf.text(`${i+1}. ${e.ex} ${e.w}kg x ${e.r} ${e.date}`,10,y);
    y+=10;
  });
  pdf.save("gym.pdf");
}

// HELPERS
function val(id){return document.getElementById(id).value}
function clear(){["ex","w","r"].forEach(id=>document.getElementById(id).value="")}
function save(){localStorage.setItem("gymData",JSON.stringify(data))}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
