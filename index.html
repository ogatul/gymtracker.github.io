<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  padding: 20px;
  text-align: center;
}

h1 { margin-bottom: 10px; }

button {
  padding: 10px;
  margin: 5px;
  border: 1px solid white;
  background: white;
  color: black;
  cursor: pointer;
}

button.active {
  background: black;
  color: white;
}

input {
  padding: 10px;
  margin: 5px;
  border: 1px solid white;
  background: black;
  color: white;
}

.card {
  border: 1px solid white;
  padding: 10px;
  margin: 10px auto;
  max-width: 400px;
  text-align: left;
}

.small {
  padding: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>GYM TRACKER</h1>

<!-- DAY BUTTONS -->
<div>
  <button onclick="setDay('push')" id="pushBtn">PUSH</button>
  <button onclick="setDay('pull')" id="pullBtn">PULL</button>
  <button onclick="setDay('legs')" id="legsBtn">LEGS</button>
</div>

<!-- VIEW ALL -->
<div>
  <button onclick="toggleAll()">VIEW ALL</button>
</div>

<h2 id="title">SELECT DAY</h2>
<p id="date"></p>

<!-- INPUT -->
<div>
  <input id="ex" placeholder="Exercise">
  <input id="w" placeholder="Weight">
  <input id="r" placeholder="Reps">
  <br>
  <button onclick="add()">ADD</button>
</div>

<hr>

<div id="output"></div>

<script>
let data = JSON.parse(localStorage.getItem("gymData")) || [];
let currentDay = "";
let showAll = false;

// DATE
document.getElementById("date").innerText = new Date().toDateString();

// SELECT DAY
function setDay(day) {
  currentDay = day;
  showAll = false;

  document.getElementById("title").innerText = day.toUpperCase();

  document.getElementById("pushBtn").classList.remove("active");
  document.getElementById("pullBtn").classList.remove("active");
  document.getElementById("legsBtn").classList.remove("active");

  document.getElementById(day + "Btn").classList.add("active");

  show();
}

// TOGGLE ALL HISTORY
function toggleAll() {
  showAll = !showAll;
  show();
}

// ADD ENTRY
function add() {
  if (!currentDay) {
    alert("Select day first");
    return;
  }

  let ex = document.getElementById("ex").value;
  let w = document.getElementById("w").value;
  let r = document.getElementById("r").value;

  if (!ex || !w || !r) {
    alert("Fill all fields");
    return;
  }

  data.push({
    id: Date.now(),
    day: currentDay,
    ex: ex,
    w: w,
    r: r,
    date: new Date().toDateString()
  });

  localStorage.setItem("gymData", JSON.stringify(data));

  document.getElementById("ex").value = "";
  document.getElementById("w").value = "";
  document.getElementById("r").value = "";

  show();
}

// SHOW DATA
function show() {
  let out = document.getElementById("output");
  out.innerHTML = "";

  let list = showAll ? data : data.filter(e => e.day === currentDay);

  if (list.length === 0) {
    out.innerHTML = "<p>No data</p>";
    return;
  }

  list.slice().reverse().forEach(e => {
    out.innerHTML += `
      <div class="card">
        <strong>${e.day.toUpperCase()}</strong><br>
        ${e.ex}<br>
        ${e.w} kg × ${e.r}<br>
        📅 ${e.date}
        <br>
        <button class="small" onclick="edit(${e.id})">EDIT</button>
        <button class="small" onclick="del(${e.id})">DELETE</button>
      </div>
    `;
  });
}

// DELETE
function del(id) {
  data = data.filter(e => e.id !== id);
  localStorage.setItem("gymData", JSON.stringify(data));
  show();
}

// EDIT
function edit(id) {
  let item = data.find(e => e.id === id);

  let ex = prompt("Exercise:", item.ex);
  let w = prompt("Weight:", item.w);
  let r = prompt("Reps:", item.r);

  if (!ex || !w || !r) return;

  item.ex = ex;
  item.w = w;
  item.r = r;

  localStorage.setItem("gymData", JSON.stringify(data));
  show();
}
</script>

</body>
</html>
